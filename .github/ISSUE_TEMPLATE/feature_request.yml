name: 🚀 Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feature request!

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature
      placeholder: "Describe the feature you'd like to see..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Solved
      placeholder: "This feature would solve..."

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: "I suggest implementing this by..."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: "I've considered..."

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched for similar feature requests
        - label: This is a new feature, not a variation of an existing one
