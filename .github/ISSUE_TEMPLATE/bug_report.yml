name: 🐛 Bug Report
description: Report something that isn't working correctly
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!

        **For security vulnerabilities, do NOT open an issue — contact yap8572@gmail.com directly.**

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
      placeholder: "Describe the bug here..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "What should happen instead..."

  - type: input
    id: version
    attributes:
      label: pycargo Version
      placeholder: "e.g., 0.0.1"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      placeholder: |
        ```
        error: ...
        ```

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched for similar issues
          required: true
        - label: I tested with the latest version
          required: true
